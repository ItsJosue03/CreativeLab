<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Josué — AI Design Assistant · CreativeLab</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#050508;--surface:#0d0d16;--surface2:#13131e;--border:rgba(255,255,255,0.07);--text:#f0eee8;--muted:#6b6878;--accent:#ff2d2d;--josue:#7b5cf7;--josue-glow:rgba(123,92,247,0.2);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-weight:500;min-height:100vh;overflow-x:hidden;cursor:none;}
  @media(pointer:coarse){
    body,button,a,input,select,textarea,[onclick],label{cursor:auto!important;}
    #cursor{display:none!important;}
    /* Tap highlight for better mobile feedback */
    button,a,[onclick]{-webkit-tap-highlight-color:rgba(255,45,45,0.15);}
    /* Touch targets mínimos 44px */
    .design-type-btn,.option-btn,.send-btn,.custom-send,.back-btn,.lang-toggle{min-height:44px;}
    /* iOS: evitar zoom automático en inputs */
    input,select,textarea{font-size:16px!important;}
  }
  #cursor{position:fixed;top:0;left:0;z-index:9999;pointer-events:none;}
  #cursor .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;position:absolute;transform:translate(-50%,-50%);}
  #cursor .ring{width:36px;height:36px;border:1.5px solid rgba(255,45,45,0.5);border-radius:50%;position:absolute;transform:translate(-50%,-50%);transition:all .35s cubic-bezier(.16,1,.3,1);}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
  /* NAV */
  .top-nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 1.8rem;}
  .back-btn{display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:100px;padding:.5rem 1rem;color:var(--muted);font-size:.75rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:all .25s;}
  .back-btn:hover{border-color:var(--accent);color:var(--accent);}
  .lang-toggle{display:flex;align-items:center;gap:.35rem;background:transparent;border:1px solid rgba(255,255,255,0.08);border-radius:100px;padding:.4rem .8rem;cursor:pointer;transition:border-color .2s;}
  .lang-toggle:hover{border-color:rgba(255,255,255,0.2);}
  .lang-opt{font-size:.72rem;font-weight:800;letter-spacing:.12em;color:var(--muted);transition:color .2s;}
  .lang-opt.active{color:var(--accent);}
  .lang-sep{font-size:.65rem;color:var(--border);}
  /* LAYOUT */
  .page-wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
  .chat-header{text-align:center;padding:5.5rem 2rem 2rem;}
  .josue-avatar{width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,var(--josue),#a78bfa);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff;box-shadow:0 0 30px var(--josue-glow);position:relative;}
  .josue-avatar::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(123,92,247,.35);animation:ringPulse 2s ease-out infinite;}
  @keyframes ringPulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}
  .online-dot{position:absolute;bottom:4px;right:4px;width:14px;height:14px;background:#22c55e;border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 8px rgba(34,197,94,.6);animation:blink 2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .chat-header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,6vw,4.5rem);line-height:.95;}
  .chat-header h1 span{color:var(--accent);}
  .chat-header p{color:var(--muted);font-size:.88rem;font-weight:500;margin-top:.6rem;}
  /* DESIGN SELECTOR */
  .design-selector{max-width:760px;margin:0 auto;padding:0 1.5rem 2rem;}
  .design-selector-label{text-align:center;font-size:.7rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
  .design-types{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.7rem;}
  .design-type-btn{display:flex;flex-direction:column;align-items:center;gap:.5rem;background:rgba(255,255,255,.03);border:1.5px solid var(--border);border-radius:14px;padding:1rem .8rem;cursor:pointer;font-family:'Barlow',sans-serif;font-size:.78rem;font-weight:800;color:var(--muted);letter-spacing:.05em;transition:all .25s cubic-bezier(.16,1,.3,1);}
  .design-type-btn:hover{border-color:var(--accent);color:var(--text);transform:translateY(-3px);box-shadow:0 8px 24px rgba(255,45,45,.15);}
  .design-type-btn.selected{border-color:var(--accent);color:var(--text);background:rgba(255,45,45,.08);box-shadow:0 0 20px rgba(255,45,45,.2);}
  .design-type-icon{font-size:1.5rem;}
  /* CHAT */
  .chat-wrap{flex:1;max-width:760px;width:100%;margin:0 auto;padding:0 1.5rem 2rem;display:flex;flex-direction:column;gap:1rem;}
  .msg{display:flex;gap:.8rem;align-items:flex-start;animation:msgIn .4s cubic-bezier(.16,1,.3,1) both;}
  @keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{flex-direction:row-reverse;}
  .msg-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:900;}
  .msg-avatar.josue{background:linear-gradient(135deg,var(--josue),#a78bfa);color:#fff;box-shadow:0 0 10px var(--josue-glow);font-family:'Bebas Neue',sans-serif;font-size:.8rem;}
  .msg-avatar.user-av{background:var(--accent);color:#fff;}
  .msg-bubble{max-width:78%;padding:.9rem 1.2rem;border-radius:16px;font-size:.88rem;line-height:1.65;font-weight:500;}
  .msg.josue-msg .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-top-left-radius:4px;}
  .msg.user .msg-bubble{background:var(--accent);color:#fff;border-top-right-radius:4px;font-weight:700;}
  .msg-name{font-size:.62rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--josue);margin-bottom:.3rem;}
  /* OPTIONS */
  .options-wrap{display:flex;flex-direction:column;gap:.5rem;margin-top:.8rem;}
  .option-btn{display:flex;align-items:center;gap:.8rem;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:.65rem .9rem;cursor:pointer;font-family:'Barlow',sans-serif;font-size:.83rem;font-weight:700;color:var(--text);text-align:left;transition:all .2s;width:100%;}
  .option-btn:hover{border-color:var(--accent);background:rgba(255,45,45,.06);transform:translateX(4px);}
  .option-btn.selected{border-color:var(--accent);background:rgba(255,45,45,.1);color:var(--accent);}
  .option-btn.disabled{opacity:.38;pointer-events:none;}
  .option-letter{width:24px;height:24px;border-radius:6px;background:rgba(255,45,45,.12);color:var(--accent);font-size:.72rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .option-btn.selected .option-letter{background:var(--accent);color:#fff;}
  .custom-input-wrap{display:none;margin-top:.5rem;gap:.5rem;}
  .custom-input-wrap.show{display:flex;}
  .custom-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:.65rem 1rem;color:var(--text);font-family:'Barlow',sans-serif;font-weight:700;font-size:.85rem;outline:none;transition:border-color .2s;}
  .custom-input:focus{border-color:var(--accent);}
  .custom-send{background:var(--accent);border:none;border-radius:10px;padding:.65rem .9rem;color:#fff;cursor:pointer;display:flex;align-items:center;transition:all .2s;}
  .custom-send:hover{background:#ff4444;}
  /* TYPING */
  .typing{display:flex;align-items:center;gap:.8rem;animation:msgIn .4s both;}
  .typing-bubble{background:var(--surface2);border:1px solid var(--border);border-radius:16px;border-top-left-radius:4px;padding:.9rem 1.2rem;display:flex;gap:5px;align-items:center;}
  .typing-dot{width:7px;height:7px;border-radius:50%;background:var(--josue);animation:typingBounce 1.2s infinite;}
  .typing-dot:nth-child(2){animation-delay:.2s;}
  .typing-dot:nth-child(3){animation-delay:.4s;}
  @keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
  /* INPUT BAR */
  .input-bar{position:sticky;bottom:0;background:linear-gradient(to top,var(--bg) 70%,transparent);padding:1rem 1.5rem 1.5rem;max-width:760px;width:100%;margin:0 auto;}
  .input-inner{display:flex;gap:.6rem;background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:.45rem .45rem .45rem 1.2rem;transition:border-color .2s;}
  .input-inner:focus-within{border-color:rgba(255,45,45,.35);}
  #userInput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Barlow',sans-serif;font-weight:700;font-size:.88rem;}
  #userInput::placeholder{color:var(--muted);}
  .send-btn{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
  .send-btn:hover{background:#ff4444;transform:scale(1.08);box-shadow:0 4px 16px rgba(255,45,45,.4);}
  /* SUMMARY */
  .summary-card{background:rgba(255,45,45,.05);border:1px solid rgba(255,45,45,.2);border-radius:14px;padding:1.2rem;margin-top:.8rem;}
  .summary-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;color:var(--accent);margin-bottom:.8rem;}
  .summary-row{display:flex;gap:.6rem;font-size:.8rem;font-weight:700;margin-bottom:.35rem;}
  .summary-row .sk{color:var(--muted);min-width:120px;text-transform:capitalize;}
  .summary-row .sv{color:var(--text);}
  .contact-final{margin-top:1rem;padding-top:.8rem;border-top:1px solid var(--border);font-size:.8rem;color:var(--muted);line-height:1.7;}
  .contact-final a{color:var(--accent);text-decoration:none;font-weight:800;}
  @media(max-width:600px){
    .design-types{grid-template-columns:repeat(3,1fr);}
    .msg-bubble{max-width:88%;}
    .chat-header{padding:4.5rem 1rem 1.5rem;}
    .chat-header h1{font-size:2rem;}
    .input-bar{padding:.8rem 1rem 1.2rem;}
    .design-selector{padding:0 1rem 1.5rem;}
    .chat-wrap{padding:0 1rem 1.5rem;}
    .design-type-btn{padding:.8rem .5rem;font-size:.72rem;}
  }
  @media(max-width:380px){
    .design-types{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<script>
/* ─── CURSOR ─── */
const cur=document.getElementById('cursor'),cDot=cur.querySelector('.dot'),cRing=cur.querySelector('.ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function cl(){rx+=(mx-rx)*.18;ry+=(my-ry)*.18;cDot.style.left=mx+'px';cDot.style.top=my+'px';cRing.style.left=rx+'px';cRing.style.top=ry+'px';requestAnimationFrame(cl);})();

/* ─── STARS + SHOOTING STARS ─── */
const sc=document.getElementById('stars'),sctx=sc.getContext('2d');
let st=[],shootingSt=[];
function rsz(){sc.width=innerWidth;sc.height=innerHeight;}rsz();window.addEventListener('resize',()=>{rsz();initSt();});

function initSt(){
  st=[];
  for(let i=0;i<Math.floor(innerWidth*innerHeight/2800);i++)
    st.push({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*1.3+.2,ph:Math.random()*Math.PI*2,sp:Math.random()*.004+.001,mn:Math.random()*.08+.02,mx:Math.random()*.35+.1});
}
initSt();

function spawnShoot(){
  const angle=(Math.PI/4)+(Math.random()-.5)*.35;
  const spd=20+Math.random()*12;
  shootingSt.push({x:Math.random()*sc.width*.75,y:Math.random()*sc.height*.45,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,tailLen:140+Math.random()*80,alpha:0,phase:'fadein',life:0,maxLife:50+Math.floor(Math.random()*20)});
}

function renderShooting(){
  for(let i=shootingSt.length-1;i>=0;i--){
    const s=shootingSt[i]; s.life++;
    if(s.phase==='fadein'){s.alpha=Math.min(1,s.alpha+.08);if(s.alpha>=1)s.phase='travel';}
    else if(s.phase==='travel'){if(s.life>=s.maxLife)s.phase='fadeout';}
    else{s.alpha-=.06;if(s.alpha<=0){shootingSt.splice(i,1);continue;}}
    s.x+=s.vx; s.y+=s.vy;
    const steps=s.tailLen/Math.hypot(s.vx,s.vy);
    const tx=s.x-s.vx*steps, ty=s.y-s.vy*steps;
    const g=sctx.createLinearGradient(tx,ty,s.x,s.y);
    g.addColorStop(0,'rgba(255,255,255,0)');
    g.addColorStop(.5,`rgba(255,230,230,${s.alpha*.25})`);
    g.addColorStop(1,`rgba(255,255,255,${s.alpha})`);
    sctx.beginPath();sctx.moveTo(tx,ty);sctx.lineTo(s.x,s.y);
    sctx.strokeStyle=g;sctx.lineWidth=1.8;sctx.lineCap='round';sctx.stroke();
    sctx.beginPath();sctx.arc(s.x,s.y,2,0,Math.PI*2);
    sctx.fillStyle=`rgba(255,255,255,${s.alpha})`;sctx.fill();
  }
}

(function loop(){
  sctx.clearRect(0,0,sc.width,sc.height);
  st.forEach(s=>{s.ph+=s.sp;const a=s.mn+(Math.sin(s.ph)*.5+.5)*(s.mx-s.mn);sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);sctx.fillStyle=`rgba(255,255,255,${a})`;sctx.fill();});
  renderShooting();
  requestAnimationFrame(loop);
})();

// First shooting star at 1.5s then every ~10s
setTimeout(function fire(){spawnShoot();setTimeout(fire,9000+Math.random()*2000);},1500);

/* ─── LANGUAGE ─── */

  },

    welcome: 'Hey! I\'m <strong>Josué</strong> 👋, the design assistant at <strong>CreativeLab</strong>.<br><br>Select the type of design you need above and I\'ll ask you personalized questions to understand exactly what you\'re looking for. Let\'s go! 🚀',

    startMsg: (type) => `Perfect! Let\'s create your <strong>${type}</strong> 🔥<br><br>I\'m <strong>Josué</strong>, the design assistant at CreativeLab. I\'ll ask you a few quick questions to understand exactly what you need.`,
  }
};

const Q = {
  es: {
    logo:[

function toggleLang() {
  lang = lang === 'es' ? 'en' : 'es';
  document.getElementById('langEN').classList.toggle('active', lang === 'en');
  document.getElementById('langES').classList.toggle('active', lang === 'es');
  applyTranslations();
}

function applyTranslations() {
  const t = T[lang];
  document.getElementById('backTxt').textContent = t.back;
  document.getElementById('heroTitle').innerHTML = t.heroTitle;
  document.getElementById('heroSub').innerHTML = t.heroSub;
  document.getElementById('selectorLabel').textContent = t.selectorLabel;
  document.getElementById('userInput').placeholder = t.placeholder;
  document.querySelectorAll('.btn-label').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });
}

/* ─── STATE ─── */
let designType=null, step=0, answers={}, history=[];

function selectDesignType(btn, typeKey) {
  designType = typeKey;
  step=0; answers={}; history=[];
  document.querySelectorAll('.design-type-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('chatWrap').innerHTML='';
  const typeName = T[lang].typeNames[typeKey];
  addJosue(T[lang].startMsg(typeName));
  setTimeout(askNext, 900);
}

function askNext() {
  const qs = Q[lang][designType];
  if(!qs || step>=qs.length){ showSummary(); return; }
  showTyping(()=>addQuestion(qs[step].q, qs[step].opts, step), 900);
}

function addJosue(html) {
  const w=document.getElementById('chatWrap');
  const d=document.createElement('div');
  d.className='msg josue-msg';
  d.innerHTML=`<div class="msg-avatar josue">JO</div><div><div class="msg-name">${T[lang].josueLabel}</div><div class="msg-bubble">${html}</div></div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}

function addQuestion(q,opts,qi) {
  const w=document.getElementById('chatWrap');
  const d=document.createElement('div');
  d.className='msg josue-msg';
  const L=['A','B','C','D'];
  const ob=opts.map((o,i)=>`<button class="option-btn" id="ob-${qi}-${i}" onclick="pickOpt(${qi},${i},'${o.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')" ><span class="option-letter">${L[i]}</span>${o.replace(/^[ABCD]\)\s*/,'')}</button>`).join('');
  const cp = T[lang].customPlaceholder;
  d.innerHTML=`<div class="msg-avatar josue">JO</div><div style="flex:1"><div class="msg-name">${T[lang].josueLabel}</div><div class="msg-bubble">${q}<div class="options-wrap">${ob}</div><div class="custom-input-wrap" id="ci-${qi}"><input class="custom-input" id="cv-${qi}" type="text" placeholder="${cp}"/><button class="custom-send" onclick="submitCustom(${qi})"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg></button></div></div></div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}

function pickOpt(qi,oi,txt) {
  if(oi===3){
    document.getElementById(`ci-${qi}`).classList.add('show');
    document.getElementById(`cv-${qi}`).focus();
    document.getElementById(`ob-${qi}-3`).classList.add('selected');
    return;
  }
  lockOpts(qi,oi);
  recordAns(txt.replace(/^[ABCD]\)\s*/,''));
}

function submitCustom(qi) {
  const v=document.getElementById(`cv-${qi}`).value.trim();
  if(!v)return;
  lockOpts(qi,3);
  recordAns(v);
}

function lockOpts(qi,sel) {
  [0,1,2,3].forEach(i=>{
    const b=document.getElementById(`ob-${qi}-${i}`);
    if(b){b.classList.add('disabled');if(i===sel)b.classList.add('selected');}
  });
  const ci=document.getElementById(`ci-${qi}`);
  if(ci)ci.style.pointerEvents='none';
}

function recordAns(txt) {
  const qs=Q[lang][designType];
  answers[qs[step].key]=txt;
  addUser(txt);
  step++;
  const rsp=T[lang].responses;
  setTimeout(()=>{
    if(step<qs.length){addJosue(rsp[Math.min(step-1,rsp.length-1)]);setTimeout(askNext,600);}
    else showSummary();
  },400);
}

function addUser(txt) {
  const w=document.getElementById('chatWrap');
  const d=document.createElement('div');
  d.className='msg user';
  d.innerHTML=`<div class="msg-avatar user-av">${lang==='es'?'TÚ':'YOU'}</div><div class="msg-bubble">${txt}</div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}

function showTyping(cb,delay) {
  const w=document.getElementById('chatWrap');
  const d=document.createElement('div');
  d.className='typing';d.id='typ';
  d.innerHTML=`<div class="msg-avatar josue">JO</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  w.appendChild(d);w.scrollTop=w.scrollHeight;
  setTimeout(()=>{d.remove();cb();},delay);
}

function showSummary() {
  showTyping(()=>{
    const t=T[lang];
    const typeName=t.typeNames[designType];
    const rows=Object.entries(answers).map(([k,v])=>`<div class="summary-row"><span class="sk">${k.replace(/_/g,' ')}</span><span class="sv">${v}</span></div>`).join('');
    const w=document.getElementById('chatWrap');
    const d=document.createElement('div');
    d.className='msg josue-msg';
    d.innerHTML=`<div class="msg-avatar josue">JO</div><div style="flex:1"><div class="msg-name">${t.josueLabel}</div><div class="msg-bubble">${t.summaryIntro} <strong>${typeName}</strong>:<div class="summary-card" id="summaryCardEl"><div class="summary-title">${t.summaryTitle}</div><div class="summary-row"><span class="sk">${t.summaryType}</span><span class="sv">${typeName}</span></div>${rows}<div class="contact-final">${t.contactMsg}</div></div><div id="emailStatus" style="margin-top:.8rem;font-size:.78rem;color:var(--muted);font-weight:700;"></div></div></div></div>`;
    w.appendChild(d);w.scrollTop=w.scrollHeight;

    // Generate summary image and send email
    setTimeout(()=>generateAndSend(typeName, answers), 800);
    setTimeout(()=>addJosue(t.startOver),1200);
  },1400);
}

function generateAndSend(typeName, ans) {
  // Build a canvas image of the summary card
  const cvs = document.createElement('canvas');
  cvs.width = 700; cvs.height = 80 + Object.keys(ans).length * 46 + 140;
  const cx = cvs.getContext('2d');

  // Background
  cx.fillStyle = '#0d0d16';
  cx.fillRect(0,0,cvs.width,cvs.height);

  // Red top accent bar
  cx.fillStyle = '#ff2d2d';
  cx.fillRect(0,0,cvs.width,5);

  // Border
  cx.strokeStyle = 'rgba(255,45,45,0.3)';
  cx.lineWidth = 1.5;
  cx.strokeRect(1,1,cvs.width-2,cvs.height-2);

  // Header
  cx.fillStyle = '#ff2d2d';
  cx.font = 'bold 13px Arial';
  cx.letterSpacing = '0.15em';
  cx.fillText('CREATIVELAB — NUEVO PEDIDO DE DISEÑO', 28, 40);

  // Type
  cx.fillStyle = 'rgba(255,255,255,0.4)';
  cx.font = '12px Arial';
  cx.fillText('TIPO DE DISEÑO', 28, 72);
  cx.fillStyle = '#f0eee8';
  cx.font = 'bold 15px Arial';
  cx.fillText(typeName, 200, 72);

  // Divider
  cx.strokeStyle = 'rgba(255,255,255,0.08)';
  cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(28,84); cx.lineTo(cvs.width-28,84); cx.stroke();

  // Rows
  let y = 112;
  Object.entries(ans).forEach(([k,v]) => {
    cx.fillStyle = 'rgba(255,255,255,0.38)';
    cx.font = '12px Arial';
    cx.fillText(k.replace(/_/g,' ').toUpperCase(), 28, y);
    cx.fillStyle = '#f0eee8';
    cx.font = 'bold 13px Arial';
    cx.fillText(v, 200, y);
    y += 46;
  });

  // Footer divider
  cx.strokeStyle = 'rgba(255,255,255,0.08)';
  cx.beginPath(); cx.moveTo(28,y+4); cx.lineTo(cvs.width-28,y+4); cx.stroke();

  // Footer contact
  cx.fillStyle = 'rgba(255,255,255,0.4)';
  cx.font = '11px Arial';
  cx.fillText('📧 Creativelab824@gmail.com   📞 849 454 7811', 28, y+30);

  cx.fillStyle = 'rgba(255,45,45,0.6)';
  cx.font = '10px Arial';
  cx.fillText('Generado por Josué AI · CreativeLab', 28, y+52);

  // Convert to base64 and send email
  const imgData = cvs.toDataURL('image/png');
  sendEmailWithImage(typeName, ans, imgData);
}

async function sendEmailWithImage(typeName, ans, imgBase64) {
  const statusEl = document.getElementById('emailStatus');
  if(statusEl) statusEl.textContent = lang==='es' ? '📨 Enviando tu solicitud...' : '📨 Sending your request...';

  // Build plain text summary for email body
  const rows = Object.entries(ans).map(([k,v])=>`• ${k.replace(/_/g,' ')}: ${v}`).join('\n');
  const body = `🎨 NUEVO PEDIDO DE DISEÑO - CREATIVELAB\n\nTipo de diseño: ${typeName}\n\n${rows}\n\n---\nGenerado por Josué AI\nContacto del cliente disponible en el chat.`;

  // EmailJS — CreativeLab
  const PUBLIC_KEY  = 'yg8U6qVh6u7UJiT2u';
  const SERVICE_ID  = 'service_gw7xtdq';
  const TEMPLATE_ID = 'template_j9tydla';

  try {
    // Load EmailJS if not already loaded
    if(typeof emailjs === 'undefined') {
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
        s.onload=()=>{emailjs.init(PUBLIC_KEY);res();}; s.onerror=rej;
        document.head.appendChild(s);
      });
    }

    await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
      to_email:   'Creativelab824@gmail.com',
      design_type: typeName,
      summary:    body,
      image_data: imgBase64,  // base64 image — use in your EmailJS template as {{image_data}}
    });

    if(statusEl) statusEl.innerHTML = `<span style="color:#22c55e">✅ ${lang==='es'?'¡Solicitud enviada a CreativeLab!':'Request sent to CreativeLab!'}</span>`;
  } catch(err) {
    // Fallback: offer direct download of the image
    if(statusEl) statusEl.innerHTML = `<span style="color:var(--accent)">${lang==='es'?'No se pudo enviar el email. ':'Could not send email. '}</span><a href="${err}" style="display:none"></a>`;
    offerDownload(imgBase64, typeName);
  }
}

function offerDownload(imgBase64, typeName) {
  const statusEl = document.getElementById('emailStatus');
  const a = document.createElement('a');
  a.href = imgBase64;
  a.download = `CreativeLab-Pedido-${typeName.replace(/\s/g,'-')}.png`;
  a.style.cssText='display:inline-flex;align-items:center;gap:.4rem;margin-top:.4rem;background:var(--accent);color:#fff;padding:.45rem 1rem;border-radius:100px;font-size:.75rem;font-weight:800;text-decoration:none;';
  a.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>${lang==='es'?'Descargar resumen':'Download summary'}`;
  if(statusEl) statusEl.appendChild(a);
}

async function sendMessage() {
  const inp=document.getElementById('userInput');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';
  if(!designType){addJosue(T[lang].noType);return;}
  addUser(txt);
  history.push({role:'user',content:txt});
  showTyping(async()=>{
    const typeName=T[lang].typeNames[designType];
    const sys=lang==='es'
      ? `Eres Josué, el asistente de diseño de CreativeLab. Eres experto en diseño gráfico, branding, video y filmmaking. Responde en español, de forma amigable y concisa (máximo 2 párrafos). Diseño actual: ${typeName}. Respuestas del cliente: ${JSON.stringify(answers)}. Siempre termina recordando contactar a Creativelab824@gmail.com o 849 454 7811.`
      : `You are Josué, the design assistant at CreativeLab. You are an expert in graphic design, branding, video and filmmaking. Respond in English, friendly and concise (max 2 paragraphs). Current design: ${typeName}. Client answers: ${JSON.stringify(answers)}. Always end by reminding them to contact Creativelab824@gmail.com or 849 454 7811.`;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:sys,messages:history})});
      const data=await res.json();
      const reply=data.content?.[0]?.text||T[lang].connError;
      history.push({role:'assistant',content:reply});
      addJosue(reply.replace(/\n/g,'<br>'));
    }catch(e){addJosue(T[lang].connError);}
  },1000);
}
